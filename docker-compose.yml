services:
  postgres:
    image: postgres:16
    container_name: eduai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eduai_dev
      POSTGRES_USER: eduai
      POSTGRES_PASSWORD: eduai_dev_password
    volumes:
      - eduai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduai -d eduai_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eduai_pg_data:
